name: Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install --quiet ruff bandit mypy pip-audit -r requirements.txt

      - name: Ruff (lint)
        run: ruff check app/

      - name: Bandit (security — high severity)
        run: bandit -r app/ -lll -q

      - name: Mypy (type check)
        run: mypy app/

      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt

      - name: Hadolint (Dockerfile best practices)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: ShellCheck
        run: shellcheck docker-entrypoint.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: npm audit (frontend dependency vulnerabilities)
        working-directory: frontend
        run: |
          npm install --no-audit --ignore-scripts
          npm audit --omit=dev || true
          npm audit --audit-level=high

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

  scan:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      packages: read
      security-events: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy (container image vulnerabilities)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
          format: table
          severity: CRITICAL,HIGH
          vuln-type: library
          exit-code: 1

  smoke:
    needs: [build, scan]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start container
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA:0:7}"
          docker run -d \
            --name scoreline-smoke \
            -p 8080:8080 \
            "$IMAGE"

      - name: Wait for API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/api/status > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready within 60s"
          docker logs scoreline-smoke
          exit 1

      - name: Assert /api/status
        run: |
          RESP=$(curl -sf http://localhost:8080/api/status)
          echo "$RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'instances_total' in d, f'Missing instances_total: {d}'
          print('status: OK')
          "

      - name: Assert /api/leagues
        run: |
          RESP=$(curl -sf http://localhost:8080/api/leagues)
          echo "$RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          leagues = json.load(sys.stdin)
          assert len(leagues) > 0, 'No leagues returned'
          print(f'{len(leagues)} leagues: OK')
          "

      - name: Assert UI is served
        run: |
          curl -sf http://localhost:8080/ > /dev/null
          echo "UI: OK"

      - name: Dump logs on failure
        if: failure()
        run: docker logs scoreline-smoke

      - name: Cleanup
        if: always()
        run: docker rm -f scoreline-smoke || true
